---
- name: Configure High-Performance Virtualization Workstation (Debian 13)
  hosts: workstation
  become: true
  vars_files:
    - vars.yml
  
  vars_prompt:
    - name: "user_password"
      prompt: "Enter password for the user {{ main_user }}"
      private: yes
      encrypt: "sha512_crypt"

  roles:
    # 1. APT Infrastructure (Scorched Earth & DEB822 Sources)
    - name: Repository Management
      role: repository
      tags:
        - repo
        - repository

    # 2. Base OS (Users, Sudo, Logs, Tuning)
    - name: Base System Configuration
      role: system
      tags:
        - sys
        - system

    # 3. Performance Tuning (Z790 / NVMe / CPU)
    - name: Hardware Performance Tuning
      role: hardware
      tags:
        - hw
        - hardware

    # 4. Security layer (YubiKey / PAM Hardening)
    - name: Security and Authentication
      role: security
      when: setup_security
      tags:
        - sec
        - security

    # 5. Graphical Interface (Minimal GNOME)
    - name: Desktop Environment
      role: desktop
      tags:
        - desk
        - desktop

    # 6. Virtualization Core (QEMU / Libvirt / LVM)
    - name: Virtualization Suite
      role: virtualization
      tags:
        - virt
        - virtualization

    # 7. Network Stack (Bridges / VLAN 6)
    - name: Network and Bridge Configuration
      role: network
      tags:
        - net
        - network

    # 8. Data Protection (Initial Snapshot)
    - name: System Snapshots
      role: snapshots
      when: create_initial_snapshot
      tags:
        - snap
        - snapshots
