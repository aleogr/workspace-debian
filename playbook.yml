---
- name: Configure High-Performance Virtualization Workstation (Debian 13)
  hosts: workstation
  become: true
  vars_files:
    - vars.yml
  
  vars_prompt:
    - name: "user_password"
      prompt: "Enter password for the user {{ main_user }}"
      private: yes
      encrypt: "sha512_crypt"

  roles:
    # 1. Configurações base do SO (Sudo, Repositórios, Logs)
    - name: Base System Configuration
      role: system
      tags:
        - sys
        - system

    # 2. Otimizações de Kernel e Performance (Z790 / NVMe / CPU)
    - name: Hardware Performance Tuning
      role: hardware
      tags:
        - hw
        - hardware

    # 3. Camada de Segurança (YubiKey / PAM)
    - name: Security and Authentication
      role: security
      when: setup_security
      tags:
        - sec
        - security

    # 4. Interface Gráfica (GNOME Minimal)
    - name: Desktop Environment
      role: desktop
      tags:
        - desk
        - desktop

    # 5. Core de Virtualização (QEMU / Libvirt / LVM)
    - name: Virtualization Suite
      role: virtualization
      tags:
        - virt
        - virtualization

    # 6. Pilha de Rede (Bridges / VLAN 6 UniFi)
    - name: Network and Bridge Configuration
      role: network
      tags:
        - net
        - network

    # 7. Proteção de Dados (Snapshot Inicial)
    - name: System Snapshots
      role: snapshots
      when: create_initial_snapshot
      tags:
        - snap
        - snapshots
