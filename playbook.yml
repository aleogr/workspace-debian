---
- name: Configure High-Performance Virtualization Workstation
  hosts: workstation
  become: yes
  vars:
    setup_security: true
    create_initial_snapshot: true

  roles:
    - { role: system, tags: ['sys', 'base'] }
    - { role: security, when: setup_security, tags: ['sec', 'yubikey'] }
    - { role: desktop, tags: ['desk', 'ui'] }
    - { role: virtualization, tags: ['virt', 'kvm'] }
    - { role: network, tags: ['net', 'unifi'] }
    - { role: snapshots, when: create_initial_snapshot, tags: ['snap', 'backup'] }
