---
- name: Install QEMU, Libvirt, and Performance tools
  apt:
    pkg:
      - qemu-kvm
      - qemu-system-x86
      - qemu-system-arm
      - qemu-system-aarch64
      - qemu-system-mips
      - qemu-system-ppc
      - qemu-system-s390x
      - qemu-system-riscv
      - qemu-system-alpha
      - qemu-system-sparc
      - qemu-system-m68k
      - qemu-user
      - qemu-guest-agent
      - qemu-utils
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-manager
      - ovmf
      - tuned
      - tuned-utils

- name: Add user aleogr to virtualization groups
  user:
    name: aleogr
    groups: kvm,libvirt
    append: yes

- name: Set performance profile to virtual-host
  command: tuned-adm profile virtual-host
  changed_when: false

- name: Create Libvirt hooks directory structure
  file:
    path: "/etc/libvirt/hooks/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "qemu.d"
    - "lxc.d"
    - "network.d"

- name: Create Logical Volume lv-vms using remaining space
  lvol:
    vg: vg-debian
    lv: lv-vms
    size: 100%FREE
    state: present

- name: Ensure libvirtd is started
  systemctl:
    name: libvirtd
    state: started
    enabled: yes
