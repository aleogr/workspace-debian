---
# 1. Virtualization Stack Installation
- name: Install QEMU architectures and Virtualization management tools
  apt:
    pkg:
      - qemu-kvm
      - qemu-system-x86
      - qemu-system-arm
      - qemu-system-aarch64
      - qemu-system-mips
      - qemu-system-ppc
      - qemu-system-s390x
      - qemu-system-riscv
      - qemu-system-alpha
      - qemu-system-sparc
      - qemu-system-m68k
      - qemu-user
      - qemu-guest-agent
      - qemu-utils
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-manager
      - ovmf
      - tuned
      - tuned-utils
    state: present

# 2. User Permissions
- name: Add main user to virtualization groups
  user:
    name: "{{ main_user }}"
    groups:
      - kvm
      - libvirt
    append: yes

# 3. Performance Profile
- name: Set performance profile to virtual-host using Tuned
  command: tuned-adm profile virtual-host
  changed_when: false

# 4. Libvirt Hooks Structure
- name: Create Libvirt hooks directory structure for custom scripts
  file:
    path: "/etc/libvirt/hooks/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "qemu.d"
    - "lxc.d"
    - "network.d"

# 5. Storage Allocation
- name: Create Logical Volume for Virtual Machines using remaining VG space
  lvol:
    vg: "{{ volume_group }}"
    lv: "{{ vm_lv_name }}"
    size: 100%FREE
    state: present

# 6. Service Activation
- name: Ensure libvirtd service is enabled and running
  systemctl:
    name: libvirtd
    enabled: yes
    state: started
