---
- name: Install all QEMU architectures and Libvirt tools
  apt:
    pkg:
      - qemu-kvm
      - qemu-system-x86
      - qemu-system-arm
      - qemu-system-aarch64
      - qemu-system-mips
      - qemu-system-ppc
      - qemu-system-s390x
      - qemu-system-riscv
      - qemu-system-alpha
      - qemu-system-sparc
      - qemu-system-m68k
      - qemu-user
      - qemu-guest-agent
      - qemu-utils
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-manager
      - ovmf

- name: Add user aleogr to virtualization groups
  user:
    name: aleogr
    groups: kvm,libvirt
    append: yes

- name: Ensure libvirtd is enabled and running
  systemctl:
    name: libvirtd
    enabled: yes
    state: started

- name: Create Logical Volume for VMs using remaining space
  lvol:
    vg: vg-debian
    lv: lv-vms
    size: 100%FREE
    state: present
