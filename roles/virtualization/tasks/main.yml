---
# 1. Hardware Validation (Tratamento elegante para evitar logs vermelhos em VMs)
- name: Hardware Virtualization Check
  block:
    - name: Verify CPU virtualization support (VT-x/AMD-V)
      shell: grep -E 'vmx|svm' /proc/cpuinfo
      register: cpu_virt
      changed_when: false
  rescue:
    - name: Notify virtualization status (Guest Mode)
      debug:
        msg: "INFO: Virtualização aninhada não detectada. Isso é normal e esperado em Máquinas Virtuais."
      when: ansible_virtualization_type != 'none'

    - name: Fail if virtualization is disabled in BIOS (Physical Hardware)
      fail:
        msg: "ERRO CRÍTICO: Virtualização desligada na BIOS. Ative VT-x/SVM na sua placa-mãe Z790!"
      when: ansible_virtualization_type == 'none'

# 2. Software Installation (Completo: Roda em ambos os ambientes)
- name: Install QEMU and Libvirt tools
  apt:
    pkg:
      - qemu-kvm
      - qemu-system-x86
      - qemu-system-arm
      - qemu-system-aarch64
      - qemu-system-mips
      - qemu-system-ppc
      - qemu-system-s390x
      - qemu-system-riscv
      - qemu-system-alpha
      - qemu-system-sparc
      - qemu-system-m68k
      - qemu-user
      - qemu-guest-agent
      - qemu-utils
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-manager
      - ovmf
      - tuned
      - tuned-utils
    state: present

- name: Add user to virtualization groups
  user:
    name: "{{ main_user }}"
    groups:
      - kvm
      - libvirt
    append: yes

# 3. Host Tuning and Storage (Apenas Hardware Real)
- name: Configure Host Performance and Storage
  block:
    - name: Set performance profile
      command: tuned-adm profile virtual-host
      changed_when: false

    - name: Create Logical Volume for VMs
      lvol:
        vg: "{{ volume_group }}"
        lv: "{{ vm_lv_name }}"
        size: 100%FREE
        state: present
      ignore_errors: yes 
  when: ansible_virtualization_type == 'none'

# 4. Infrastructure and Services
- name: Create Libvirt hooks structure
  file:
    path: "/etc/libvirt/hooks/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "qemu.d"
    - "lxc.d"
    - "network.d"

- name: Ensure libvirtd is started
  systemd:
    name: libvirtd
    enabled: yes
    state: started
