---
# 1. Hardware Validation (Lógica Ultra-Clean sem logs vermelhos)
- name: Check CPU Virtualization Flags
  # O parâmetro -c faz o grep contar as ocorrências (0 ou >0)
  shell: grep -cE 'vmx|svm' /proc/cpuinfo
  register: cpu_check
  # Impede o output vermelho mesmo se o resultado for 0
  failed_when: false
  changed_when: false

- name: Report Virtualization Status (Physical Hardware)
  debug:
    msg: "OK: Virtualização (VT-x/SVM) detectada com sucesso no hardware real."
  when: cpu_check.stdout != "0" and ansible_virtualization_type == 'none'

- name: Report Virtualization Status (Guest/VM)
  debug:
    msg: "INFO: Rodando em ambiente virtual. Virtualização aninhada não disponível (comportamento esperado)."
  when: cpu_check.stdout == "0" and ansible_virtualization_type != 'none'

- name: STOP: BIOS Configuration Error
  fail:
    msg: "ERRO CRÍTICO: Virtualização desativada na BIOS! Ative VT-x/SVM na sua ASUS Z790 HERO."
  when: cpu_check.stdout == "0" and ansible_virtualization_type == 'none'

# 2. Software Installation (Roda em qualquer ambiente)
- name: Install QEMU and Libvirt tools
  apt:
    pkg:
      - qemu-kvm
      - qemu-system-x86
      - qemu-system-arm
      - qemu-system-aarch64
      - qemu-system-mips
      - qemu-system-ppc
      - qemu-system-s390x
      - qemu-system-riscv
      - qemu-system-alpha
      - qemu-system-sparc
      - qemu-system-m68k
      - qemu-user
      - qemu-guest-agent
      - qemu-utils
      - libvirt-daemon-system
      - libvirt-clients
      - bridge-utils
      - virt-manager
      - ovmf
      - tuned
      - tuned-utils
    state: present

- name: Add user to virtualization groups
  user:
    name: "{{ main_user }}"
    groups:
      - kvm
      - libvirt
    append: yes

# 3. Host Tuning and Storage (Apenas Hardware Real)
- name: Configure Host Performance and Storage
  block:
    - name: Set performance profile
      command: tuned-adm profile virtual-host
      changed_when: false

    - name: Create Logical Volume for VMs
      lvol:
        vg: "{{ volume_group }}"
        lv: "{{ vm_lv_name }}"
        size: 100%FREE
        state: present
      ignore_errors: yes 
  when: ansible_virtualization_type == 'none'

# 4. Infrastructure and Services
- name: Create Libvirt hooks structure
  file:
    path: "/etc/libvirt/hooks/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - ""
    - "qemu.d"
    - "lxc.d"
    - "network.d"

- name: Ensure libvirtd is started
  systemd:
    name: libvirtd
    enabled: yes
    state: started
