---
# 1. GNOME Desktop Installation
- name: Install minimal GNOME Desktop components
  apt:
    pkg:
      - gnome-shell
      - gnome-terminal
      - gdm3
    state: present

# 2. Service Management
- name: Ensure GDM3 display manager is enabled and started
  systemctl:
    name: gdm3
    enabled: yes
    state: started
