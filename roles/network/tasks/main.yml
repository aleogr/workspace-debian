---
# 1. NetworkManager Installation
- name: Install NetworkManager and GNOME integration
  apt:
    pkg:
      - network-manager
      - network-manager-gnome
    state: present

# 2. Legacy Cleanup
- name: Disable and stop legacy networking service
  systemctl:
    name: networking
    enabled: no
    state: stopped

- name: Remove legacy network interfaces file to avoid conflicts
  file:
    path: /etc/network/interfaces
    state: absent

# 3. Service Management
- name: Ensure NetworkManager is enabled and started
  systemctl:
    name: NetworkManager
    enabled: yes
    state: started

# 4. Bridge and VLAN Configuration (UniFi Integration)
- name: Create Bridge interface ({{ bridge_name }})
  nmcli:
    type: bridge
    conn_name: "{{ bridge_name }}"
    ifname: "{{ bridge_name }}"
    stp: no
    state: present

- name: Create VLAN {{ vlan_id }} on {{ physical_interface }} and attach to bridge
  nmcli:
    type: vlan
    conn_name: "{{ physical_interface }}.vlan-vm"
    vlanid: "{{ vlan_id }}"
    vlandev: "{{ physical_interface }}"
    master: "{{ bridge_name }}"
    state: present

- name: Bring up Bridge and VLAN connections
  shell: |
    nmcli con up {{ bridge_name }}
    nmcli con up {{ physical_interface }}.vlan-vm
  changed_when: false

# 5. Libvirt Network Definition
- name: Configure Libvirt network for the bridge
  block:
    - name: Generate Libvirt network XML file
      copy:
        dest: "/tmp/{{ bridge_name }}.xml"
        content: |
          <network>
            <name>{{ bridge_name }}</name>
            <forward mode='bridge'/>
            <bridge name='{{ bridge_name }}'/>
          </network>

    - name: Define and autostart Libvirt network bridge
      virt_net:
        name: "{{ bridge_name }}"
        command: define
        xml: "{{ lookup('file', '/tmp/' + bridge_name + '.xml') }}"
        autostart: yes
        state: active
