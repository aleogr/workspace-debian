---
- name: Install NetworkManager
  apt:
    pkg:
      - network-manager
      - network-manager-gnome
    state: present

- name: Disable legacy networking
  systemctl:
    name: networking
    enabled: no
    state: stopped

- name: Remove legacy interfaces file
  file:
    path: /etc/network/interfaces
    state: absent

- name: Ensure NetworkManager is started
  systemctl:
    name: NetworkManager
    enabled: yes
    state: started

- name: Create Bridge interface ({{ bridge_name }})
  nmcli:
    type: bridge
    conn_name: "{{ bridge_name }}"
    ifname: "{{ bridge_name }}"
    stp: no
    state: present

- name: Create VLAN {{ vlan_id }} on {{ physical_interface }}
  nmcli:
    type: vlan
    conn_name: "{{ physical_interface }}.vlan-vm"
    vlanid: "{{ vlan_id }}"
    vlandev: "{{ physical_interface }}"
    master: "{{ bridge_name }}"
    state: present

- name: Bring up connections
  shell: |
    nmcli con up {{ bridge_name }}
    nmcli con up {{ physical_interface }}.vlan-vm
  changed_when: false

- name: Configure Libvirt bridge network
  block:
    - name: Generate Libvirt network XML
      copy:
        dest: "/tmp/{{ bridge_name }}.xml"
        content: |
          <network>
            <name>{{ bridge_name }}</name>
            <forward mode='bridge'/>
            <bridge name='{{ bridge_name }}'/>
          </network>

    - name: Define and start Libvirt network
      virt_net:
        name: "{{ bridge_name }}"
        command: define
        xml: "{{ lookup('file', '/tmp/' + bridge_name + '.xml') }}"
        autostart: yes
        state: active
