---
# 1. Instalação das ferramentas
- name: Install Timeshift
  apt:
    pkg:
      - timeshift
      - inotify-tools
    state: present

# 2. Identificação dinâmica do hardware para evitar perguntas do Timeshift
- name: Get Root Partition UUID
  command: grub-probe --target=fs_uuid /
  register: root_uuid
  changed_when: false

# 3. Configuração do JSON com o UUID injetado
- name: Configure Timeshift JSON
  copy:
    dest: /etc/timeshift/timeshift.json
    content: |
      {
        "backup_device_uuid": "{{ root_uuid.stdout }}",
        "parent_directory": "/",
        "do_first_run": "false",
        "btrfs_mode": "false",
        "include_btrfs_home_for_snapshots": "false",
        "include_btrfs_home_for_restore": "false",
        "stop_cron_emails": "true",
        "schedule_monthly": "false",
        "schedule_weekly": "false",
        "schedule_daily": "true",
        "schedule_hourly": "false",
        "schedule_boot": "false",
        "count_monthly": "2",
        "count_weekly": "3",
        "count_daily": "5",
        "count_hourly": "6",
        "count_boot": "5",
        "snapshot_device": "/dev/disk/by-uuid/{{ root_uuid.stdout }}",
        "rrsync_mode": "true"
      }
    mode: '0644'
    force: yes  # Alterado para 'yes' para garantir que o UUID correto seja aplicado

# 4. Criação do Snapshot inicial em modo não-interativo (--script)
- name: Create initial system snapshot (Asynchronous)
  command: timeshift --create --script --comments "Initial Provisioning via Ansible" --tags D
  async: 1200          # Tempo máximo de espera: 20 minutos (segurança para NVMe)
  poll: 15             # Verifica o status a cada 15 segundos
  register: timeshift_result
  # Verifica sucesso tanto por string quanto por código de retorno
  changed_when: "'Snapshot created successfully' in timeshift_result.stdout or timeshift_result.rc == 0"
  ignore_errors: yes   # Evita travas se o disco estiver muito cheio na VM
