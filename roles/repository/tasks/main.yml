---
# 1. Cleanup old configurations
- name: Create backup directory for old repository files
  file:
    path: /etc/apt/sources.list.d/backup_old
    state: directory
    mode: '0755'

- name: Move existing list files to backup to prevent conflicts
  shell: |
    mv /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/backup_old/ 2>/dev/null || true
    mv /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/backup_old/ 2>/dev/null || true
  args:
    removes: /etc/apt/sources.list.d/
  ignore_errors: true

- name: Clear main sources.list file
  copy:
    dest: /etc/apt/sources.list
    content: "# Main repositories moved to /etc/apt/sources.list.d/debian.sources\n"

# 2. Rebuild repositories in DEB822 format
- name: Create clean Debian base repositories
  copy:
    dest: /etc/apt/sources.list.d/debian.sources
    content: |
      Types: deb
      URIs: http://deb.debian.org/debian
      Suites: {{ debian_codename }} {{ debian_codename }}-updates
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      Types: deb
      URIs: http://security.debian.org/debian-security
      Suites: {{ debian_codename }}-security
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

# 3. System Update
- name: Update apt cache and perform dist-upgrade
  apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes
