---
- name: Update package cache and upgrade system
  apt:
    update_cache: yes
    upgrade: dist

- name: Install build-essential and system utilities
  apt:
    pkg:
      - build-essential
      - fastfetch
      - htop
      - hwloc
      - sudo
      - libpam-u2f

- name: Configure sudoers permissions for aleogr
  copy:
    content: "aleogr ALL=(ALL) ALL"
    dest: /etc/sudoers.d/aleogr
    mode: '0440'

- name: Create swap directory
  file:
    path: /swap
    state: directory
    mode: '0755'

- name: Configure swap file (59605MB)
  shell: |
    if [ ! -f /swap/swapfile ]; then
      touch /swap/swapfile
      chmod 600 /swap/swapfile
      chattr +C /swap/swapfile
      dd if=/dev/zero of=/swap/swapfile bs=1M count=59605 status=progress
      mkswap /swap/swapfile
      swapon /swap/swapfile
      echo "/swap/swapfile none swap defaults 0 0" >> /etc/fstab
    fi
  args:
    creates: /swap/swapfile

- name: Enable PAM U2F authentication
  lineinfile:
    path: "/etc/pam.d/{{ item }}"
    insertafter: "@include common-auth"
    line: "auth required pam_u2f.so"
  loop:
    - sudo
    - gdm-password
    - login
