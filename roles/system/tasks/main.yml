---
- name: Update package cache and upgrade system
  apt:
    update_cache: yes
    upgrade: dist

- name: Install build-essential and base tools
  apt:
    pkg:
      - build-essential
      - fastfetch
      - htop
      - hwloc
      - sudo

- name: Configure sudoers for aleogr
  copy:
    content: "aleogr ALL=(ALL) ALL"
    dest: /etc/sudoers.d/aleogr
    mode: '0440'

- name: Optimize journald log size limits (500MB max)
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxUse="
    line: "SystemMaxUse=500M"
    state: present
  notify: Restart journald
