---
# 1. Repository Cleanup (Scorched Earth Policy)
- name: Create backup directory for old repository files
  file:
    path: /etc/apt/sources.list.d/backup_old
    state: directory
    mode: '0755'

- name: Move existing list files to backup to prevent conflicts
  shell: |
    mv /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/backup_old/ 2>/dev/null || true
    mv /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/backup_old/ 2>/dev/null || true
  args:
    removes: /etc/apt/sources.list.d/
  ignore_errors: true

- name: Clear main sources.list file
  copy:
    dest: /etc/apt/sources.list
    content: "# Main repositories moved to /etc/apt/sources.list.d/debian.sources\n"

# 2. Repository Reconstruction (DEB822 Format)
- name: Create clean Debian 13 (Trixie) base repositories
  copy:
    dest: /etc/apt/sources.list.d/debian.sources
    content: |
      Types: deb
      URIs: http://deb.debian.org/debian
      Suites: {{ debian_codename }} {{ debian_codename }}-updates
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      Types: deb
      URIs: http://security.debian.org/debian-security
      Suites: {{ debian_codename }}-security
      Components: main contrib non-free non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

# 3. System Update
- name: Update apt cache and perform dist-upgrade
  apt:
    update_cache: yes
    upgrade: dist
    autoremove: yes

# 4. Essential Packages and Hardware Firmware
- name: Install essential administration and hardware support tools
  apt:
    pkg:
      - intel-microcode
      - build-essential
      - fastfetch
      - htop
      - btop
      - curl
      - git
      - vim
      - hwloc
      - sudo
      - ethtool
      - net-tools
      - nvtop
    state: present

# 5. User and Privilege Configuration
- name: Ensure main user has the provided password and shell
  user:
    name: "{{ main_user }}"
    password: "{{ user_password }}"
    shell: /bin/bash
    groups: sudo
    append: yes

- name: Configure sudoers file for {{ main_user }}
  copy:
    content: "{{ main_user }} ALL=(ALL) ALL"
    dest: "/etc/sudoers.d/{{ main_user }}"
    mode: '0440'

# 6. Performance and Log Tuning
- name: Optimize journald log size limits (500MB max)
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxUse="
    line: "SystemMaxUse={{ journal_max_size }}"
    state: present
  notify: Restart journald

- name: Configure System Swappiness (Prioritize RAM)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_file: /etc/sysctl.d/99-swappiness.conf

- name: Increase File System watchers for virtualization
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    state: present
    sysctl_file: /etc/sysctl.d/99-inotify.conf
