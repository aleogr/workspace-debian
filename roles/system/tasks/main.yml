---
# 1. Health Audit & Essential Packages
- name: Ensure no broken packages or interrupted installs
  command: dpkg --configure -a
  changed_when: false

- name: Audit package manager health
  command: apt-get check
  changed_when: false

- name: Install administration and hardware support tools
  apt:
    pkg:
      - intel-microcode
      - build-essential
      - fastfetch
      - htop
      - btop
      - curl
      - git
      - vim
      - hwloc
      - sudo
      - ethtool
      - net-tools
      - nvtop
    state: present

# 2. User Configuration
- name: Ensure main user has the provided password and shell
  user:
    name: "{{ main_user }}"
    password: "{{ user_password }}"
    shell: /bin/bash
    groups: sudo
    append: yes

- name: Configure sudoers file for {{ main_user }}
  copy:
    content: "{{ main_user }} ALL=(ALL) ALL"
    dest: "/etc/sudoers.d/{{ main_user }}"
    mode: '0440'

# 3. Performance Tuning
- name: Optimize journald log size limits
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxUse="
    line: "SystemMaxUse={{ journal_max_size }}"
    state: present
  notify: Restart journald

- name: Configure System Swappiness
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_file: /etc/sysctl.d/99-swappiness.conf

- name: Increase File System watchers
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    state: present
    sysctl_file: /etc/sysctl.d/99-inotify.conf
