---
# 1. System Update and Package Installation
- name: Update apt package cache and upgrade the system
  apt:
    update_cache: yes
    upgrade: dist

- name: Install base system administration tools
  apt:
    pkg:
      - build-essential
      - fastfetch
      - htop
      - hwloc
      - sudo
    state: present

# 2. User and Privilege Configuration
- name: Ensure main user has the provided password and shell
  user:
    name: "{{ main_user }}"
    password: "{{ user_password }}"
    shell: /bin/bash
    groups: sudo
    append: yes

- name: Configure sudoers file for {{ main_user }}
  copy:
    content: "{{ main_user }} ALL=(ALL) ALL"
    dest: "/etc/sudoers.d/{{ main_user }}"
    mode: '0440'

# 3. Log and Performance Tuning
- name: Optimize journald log size limits (500MB max)
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?SystemMaxUse="
    line: "SystemMaxUse={{ journal_max_size }}"
    state: present
  notify: Restart journald

- name: Configure System Swappiness (Prioritize RAM over Swap)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_file: /etc/sysctl.d/99-swappiness.conf

- name: Increase File System watchers for monitoring and virtualization
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    state: present
    sysctl_file: /etc/sysctl.d/99-inotify.conf
