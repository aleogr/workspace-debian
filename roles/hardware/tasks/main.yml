---
- name: Physical Hardware Performance Tuning
  block:
    - name: "Optimize Kernel Parameters in GRUB (NVMe & Split Lock)"
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash nvme_core.default_ps_max_latency_us=0 split_lock_detect=off"'
        state: present
      notify: Update grub

    - name: Install CPU management tools
      apt:
        name: cpufrequtils
        state: present

    - name: Set CPU Governor to Performance mode
      lineinfile:
        path: /etc/default/cpufrequtils
        regexp: '^GOVERNOR='
        line: 'GOVERNOR="performance"'
        state: present
      notify: Restart cpufrequtils

    - name: Install hardware monitoring tools
      apt:
        pkg:
          - lm-sensors
          - nvme-cli
          - smartmontools
        state: present
  when: ansible_virtualization_type == 'none'
