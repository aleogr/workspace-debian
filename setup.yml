---
- name: Configure High-Performance Virtualization Workstation (Debian 13)
  hosts: workstation
  become: true
  vars_files:
    - vars.yml
  
  vars_prompt:
    - name: "user_password"
      prompt: "Enter password for the user {{ main_user }}"
      private: yes
      encrypt: "sha512_crypt"

  roles:
    - { role: system, tags: ['sys'] }
    - { role: security, when: setup_security, tags: ['sec'] }
    - { role: desktop, tags: ['desk'] }
    - { role: virtualization, tags: ['virt'] }
    - { role: network, tags: ['net'] }
    - { role: snapshots, when: create_initial_snapshot, tags: ['snap'] }
